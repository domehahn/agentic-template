name: Agentic Template Smoke

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync Dependencies
        run: uv sync

      - name: Create Fresh Target Repo
        run: mkdir -p /tmp/agentic-smoke

      - name: Init (Codex + Copilot + Claude + GitLab)
        run: >
          uv run agentic-template init
          --target /tmp/agentic-smoke
          --platform "codex,github-copilot,claude,gitlab-duo"
          --project-name "smoke-project"

      - name: Bake
        run: uv run agentic-template bake default --target /tmp/agentic-smoke --write

      - name: Validate
        run: uv run agentic-template validate --target /tmp/agentic-smoke

      - name: Assert Core Outputs
        run: |
          test -f /tmp/agentic-smoke/AGENTS.md
          test -f /tmp/agentic-smoke/.agentic/codex/AGENTS.md
          test -f /tmp/agentic-smoke/.agentic/gitlab-duo/AGENTS.md
          test -f /tmp/agentic-smoke/.github/copilot-instructions.md
          test -f /tmp/agentic-smoke/.agentic/claude/AGENTS.md
          test -f /tmp/agentic-smoke/.gitlab/duo/chat-rules.md
